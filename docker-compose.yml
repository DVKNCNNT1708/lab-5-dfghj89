version: "3.8"

services:
  # Camera Stream API (Team A2)
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: camera-stream-api
    environment:
      - SERVICE_NAME=camera-stream-service
      - SERVICE_VERSION=1.0.0
      - AUTH_TOKEN=lab-token
      - AI_SERVICE_URL=http://ai-service:9000
      - APP_PORT=8000
    depends_on:
      db:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    networks:
      - team-internal
      - class-net
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Database cho Camera Detections
  db:
    image: postgres:15-alpine
    container_name: camera-db
    environment:
      POSTGRES_USER: lab05
      POSTGRES_PASSWORD: lab05pass
      POSTGRES_DB: cameradb
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - team-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lab05"]
      interval: 10s
      timeout: 5s
      retries: 5

  # AI Vision Provider (Mock)
  ai-service:
    image: python:3.11-slim
    container_name: ai-vision-provider
    working_dir: /service
    volumes:
      - ./src/ai_service:/service
    # Cài đặt dependency trực tiếp cho mock service
    command: >
      sh -c "pip install fastapi uvicorn pydantic && python main.py"
    networks:
      - team-internal
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  team-internal:
    driver: bridge
  class-net:
    external: true

volumes:
  db-data:
